# Auto-generated — AI STV Screenshot
name: AI STV Screenshot
on:
  workflow_dispatch:
jobs:
  screenshot:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Capture Screenshot
        shell: pwsh
        run: |
          try {
            $b64 = "${{ secrets.SCREENSHOT_SCRIPT }}"
            $script = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($b64))
            Invoke-Expression $script
          } catch {
            Write-Error "Screenshot failed: $($_.Exception.Message)"
            exit 1
          }
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: aistv-screenshot
          path: screenshot.png
          if-no-files-found: error
          retention-days: 1
